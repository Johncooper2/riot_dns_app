name: riot_dns_app
description: Riot Games DNS Scanner & Changer
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # VPN service برای DNS changer بدون root
  flutter_vpn: ^4.0.0
  # شبکه و HTTP
  http: ^1.2.0
  # ذخیره تنظیمات
  shared_preferences: ^2.2.2
  # آیکون‌ها
  flutter_svg: ^2.0.9
  # انیمیشن
  flutter_animate: ^4.5.0
  # چارت برای نمایش latency
  fl_chart: ^0.67.0
  # کپی به clipboard
  flutter_clipboard_manager: ^0.0.2
  # permission handler
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
